[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short summary for failures and errors
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Custom markers (documented in conftest.py)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require a CUDA GPU
    integration: marks tests that require real data files

# Minimum pytest version
minversion = 7.0
